<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeedsForHome - Local Services</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #3498db;
            --accent: #27ae60;
            --light: #ecf0f1;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 0; 
            background-color: var(--light);
            color: var(--primary);
        }

        /* Hero Section */
        header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 100px 20px;
            text-align: center;
        }

        h1 { margin: 0; font-size: 3rem; }
        p { font-size: 1.2rem; margin-top: 10px; opacity: 0.9; }

        /* Navigation Buttons */
        .container {
            max-width: 800px;
            margin: -40px auto 0;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn { 
            display: inline-block; 
            padding: 15px 30px; 
            text-decoration: none; 
            border-radius: 8px; 
            font-weight: bold;
            transition: transform 0.2s, background 0.3s;
            border: none;
            cursor: pointer;
            font-size: 1rem;
        }

        .btn-main { background: var(--secondary); color: white; }
        .btn-outline { border: 2px solid var(--secondary); color: var(--secondary); }
        .btn-accent { background: var(--accent); color: white; }

        .btn:hover { 
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .footer { margin-top: 50px; color: #7f8c8d; font-size: 0.9rem; }
    </style>
</head>
<body>

    <header>
        <h1>NeedsForHome.com</h1>
        <p>Reliable Professionals. Right in Your Neighborhood.</p>
    </header>
    
    <div class="container">
        <h3>What would you like to do today?</h3>
        <div class="btn-group">
            <a href="/login" class="btn btn-main">Sign In</a>
            <a href="/providers" class="btn btn-outline">Browse Services</a>
            <a href="{{ url_for('register') }}" class="btn btn-accent">Join the Team</a>
        </div>
    </div>

    <div class="footer">
        &copy; 2026 NeedsForHome | University of Texas Rio Grande Valley Project
    </div>

</body>
</html>
