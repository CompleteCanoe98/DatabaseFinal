<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - NeedsForHome</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #3498db;
            --accent: #27ae60;
            --bg: #ecf0f1;
            --danger: #e74c3c;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg); 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h2 { color: var(--primary); margin-bottom: 10px; }
        .subtitle { color: #7f8c8d; margin-bottom: 25px; font-size: 0.9rem; }

        .flash-message {
            background-color: #fdeaea;
            color: var(--danger);
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            border: 1px solid #fadbd8;
        }

        .form-group { text-align: left; margin-bottom: 20px; }

        label { display: block; margin-bottom: 8px; font-weight: bold; color: #555; }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--secondary);
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background-color: var(--secondary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
        }

        .btn-login:hover { 
            background-color: #2980b9;
            transform: translateY(-1px);
        }

        .demo-box {
            background-color: #fff9db;
            border: 1px solid #fff3bf;
            padding: 10px;
            border-radius: 6px;
            margin-top: 20px;
            font-size: 0.85rem;
            color: #856404;
        }

        .btn-back {
            background: none;
            border: 1px solid #ccc;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            color: #777;
            margin-top: 20px;
            transition: all 0.2s;
        }

        .btn-back:hover { background: #eee; color: var(--primary); }

        hr { border: 0; border-top: 1px solid #eee; margin: 25px 0; }

        p { color: #666; font-size: 0.9rem; }
        a { color: var(--secondary); text-decoration: none; font-weight: bold; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Welcome Back</h2>
        <p class="subtitle">Please enter your details to login.</p>
        
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="flash-message">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="nate@plumbing.com" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn-login">Login</button>
        </form>

        <div class="demo-box">
            <strong>Demo Credentials:</strong><br>
            nate@plumbing.com / pass123
        </div>

        <hr>

        <p>Don't have an account? <a href="{{ url_for('register') }}">Register here</a></p>

        <a href="{{ url_for('home') }}">
            <button type="button" class="btn-back">← Back to Home</button>
        </a>
    </div>

</body>
</html>
